<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>PauseMaria</title>
  <style>
    h1 { color: blue; }
  </style>
</head>

<body>

<h2>PauseMaria</h2>
<p>Klik for at få en lille pauseaktivitet.</p>

<button id="activity-btn">Få aktivitet</button>
<div id="activity-box" style="margin-top:10px;"></div>

<script>
  const activities = [
    "Stræk armene over hovedet 🙆‍♂️",
    "Tag 10 dybe vejrtrækninger 🌬️",
    "Gå en hurtig tur 🚶‍♂️"
  ];

  const STORAGE_KEY = "pausemaria_clicks";
  let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

  function getCurrentMinute() {
    const now = new Date();
    const hour = String(now.getHours()).padStart(2, "0");
    const minute = String(now.getMinutes()).padStart(2, "0");
    return `${hour}:${minute}`;
  }

  document.getElementById("activity-btn").onclick = () => {
    const random = activities[Math.floor(Math.random() * activities.length)];
    document.getElementById("activity-box").textContent = random;

    const m = getCurrentMinute();
    data[m] = (data[m] || 0) + 1;

    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  };
</script>


<!-- ⭐ FEED: Seneste 5 aktive venner -->
<h2>Seneste aktiviteter fra venner</h2>
<ul id="friend-feed"></ul>

<script>
async function loadFriendFeed() {
  try {
    // TODO: Indsæt din rigtige Worker-URL her
    const res = await fetch("https://plugandpause-backend.<din-worker-url>/feed");
    const all = await res.json();

    // 1) Sortér efter tid (nyeste først)
    all.sort((a, b) => b.timestamp - a.timestamp);

    // 2) Find de seneste 5 aktive venner (én aktivitet per ven)
    const seen = new Set();
    const latestFromFriends = [];

    for (const item of all) {
      if (!seen.has(item.user)) {
        seen.add(item.user);
        latestFromFriends.push(item);
      }
      if (latestFromFriends.length === 5) break;
    }

    // 3) Vis feedet
    const ul = document.getElementById("friend-feed");
    ul.innerHTML = "";

    latestFromFriends.forEach(item => {
      const li = document.createElement("li");
      const t = new Date(item.timestamp).toLocaleTimeString("da-DK");
      li.textContent = `${item.user} – ${item.activity} (${t})`;
      ul.appendChild(li);
    });

  } catch (err) {
    console.error("Feed fejl:", err);
  }
}

// Opdater feed hvert 10. sekund
loadFriendFeed();
setInterval(loadFriendFeed, 10000);
</script>

</body>
</html>
