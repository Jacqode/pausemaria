<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>PauseMaria</title>
</head>
<body>

  <h1>PauseMaria</h1>
  <p>Klik for at få en lille pauseaktivitet.</p>

  <button id="activity-btn">Få aktivitet</button>
  <div id="activity-box"></div>

  <h2>Data (antal pauser pr. minut)</h2>
  <pre id="data-output"></pre>

  <script>
    const activities = [
      "Stræk armene over hovedet 🙆‍♂️",
      "Tag 10 dybe vejrtrækninger 🌬️",
      "Gå en hurtig tur 🚶‍♂️"
    ];

    const STORAGE_KEY = "pausemaria_clicks";
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

    // NY: grupperer efter minut med 0-padding
    function getCurrentMinute() {
      const now = new Date();
      const hour = String(now.getHours()).padStart(2, "0");
      const minute = String(now.getMinutes()).padStart(2, "0");
      return `${hour}:${minute}`;
    }

    function renderData() {
      const output = document.getElementById("data-output");
      let text = "";
      for (const minute in data) {
        text += `${minute}: ${data[minute]} pauser\n`;
      }
      output.textContent = text || "Ingen data endnu.";
    }

    document.getElementById("activity-btn").onclick = () => {
      const random = activities[Math.floor(Math.random() * activities.length)];
      document.getElementById("activity-box").textContent = random;

      // NY: korrekt funktion
      const m = getCurrentMinute();
      data[m] = (data[m] || 0) + 1;

      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      renderData();
      drawChart();
    };

    renderData();
  </script>

<h2>Seriediagram (antal pauser pr. minut)</h2>
<canvas id="chart" width="400" height="200"></canvas>

<script>
  function drawChart() {
    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    const raw = JSON.parse(localStorage.getItem("pausemaria_clicks")) || {};

    // NY: labels sorteres korrekt (fordi de er 00:00-format)
    const labels = Object.keys(raw).sort();
    const values = labels.map(k => raw[k]);

    if (labels.length === 0) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillText("Ingen data endnu", 10, 20);
      return;
    }

    const max = Math.max(...values);

    const left = 40;
    const bottom = 20;
    const top = 10;
    const right = 10;

    const width = canvas.width - left - right;
    const height = canvas.height - top - bottom;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Akser
    ctx.beginPath();
    ctx.moveTo(left, top);
    ctx.lineTo(left, top + height);
    ctx.lineTo(left + width, top + height);
    ctx.stroke();

    const step = width / (values.length - 1);

    // Serie
    ctx.beginPath();
    values.forEach((v, i) => {
      const x = left + i * step;
      const y = top + height - (v / max) * height;

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);

      ctx.fillRect(x - 2, y - 2, 4, 4);
    });
    ctx.stroke();

    // Værdier under punkter
    ctx.font = "10px sans-serif";
    values.forEach((v, i) => {
      const x = left + i * step;
      const y = top + height + 12;
      ctx.fillText(v, x - 3, y);
    });
  }

  drawChart();
</script>

</body>
</html>
