<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>PauseMaria</title>
  <style>
    h1 { color: blue; }
  </style>
</head>

<body>

<h2>PauseMaria</h2>
<p>Klik for at få en lille pauseaktivitet.</p>

<button id="activity-btn">Få aktivitet</button>
<div id="activity-box" style="margin-top:10px;"></div>

<br><br>

<!-- Link til evaluering -->
<a href="evaluering.html">
  <button>Gå til evaluering</button>
</a>

<script>
  const activities = [
    "Stræk armene over hovedet 🙆‍♂️",
    "Tag 10 dybe vejrtrækninger 🌬️",
    "Gå en hurtig tur 🚶‍♂️"
  ];

  const STORAGE_KEY = "pausemaria_clicks";
  let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

  function getCurrentMinute() {
    const now = new Date();
    const hour = String(now.getHours()).padStart(2, "0");
    const minute = String(now.getMinutes()).padStart(2, "0");
    return `${hour}:${minute}`;
  }

  document.getElementById("activity-btn").onclick = () => {
    const random = activities[Math.floor(Math.random() * activities.length)];
    document.getElementById("activity-box").textContent = random;

    const m = getCurrentMinute();
    data[m] = (data[m] || 0) + 1;

    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  };
</script>

</body>
</html>
